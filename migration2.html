<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ย้ายประวัติสุขภาพ - Orsomo Smart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 p-6 md:p-10 flex flex-col items-center text-center font-sans h-[100dvh]">
    <div class="bg-white p-6 md:p-8 rounded-[24px] shadow-sm border border-slate-200 w-full max-w-2xl flex flex-col h-full md:h-auto">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">ระบบขนย้ายประวัติสุขภาพ (Part 2)</h1>
        <p class="mb-6 text-slate-500 text-sm">ย้ายกราฟสัญญาณชีพและผลประเมิน ADL/ซึมเศร้า ➡️ Firebase</p>
        
        <button id="btn-start" onclick="startMigration()" class="w-full bg-[#0284c7] text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-[#0369a1] transition-all active:scale-95 flex-shrink-0">
            🚀 เริ่มทำการดึงข้อมูลประวัติ
        </button>
        
        <div id="log" class="mt-6 text-left bg-slate-800 p-4 rounded-xl w-full flex-1 md:h-80 overflow-y-auto border border-slate-700 text-[13px] text-emerald-400 font-mono space-y-2 shadow-inner">
            <p class="text-slate-400">ระบบพร้อมทำงาน... กรุณากดปุ่มด้านบน</p>
            <p class="text-slate-400 text-[11px] mt-1">* กระบวนการนี้อาจใช้เวลา 2-5 นาที ขึ้นอยู่กับจำนวนผู้ป่วย ห้ามปิดหน้าจอนะครับ</p>
        </div>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function logMessage(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<p class="border-b border-slate-700/50 pb-1">${msg}</p>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function startMigration() {
            const btn = document.getElementById('btn-start');
            btn.disabled = true;
            btn.innerText = "⏳ กำลังดำเนินการ... ห้ามปิดหน้าจอ";
            btn.classList.replace('bg-[#0284c7]', 'bg-slate-500');

            logMessage("==================================");
            logMessage("🚀 เริ่มกระบวนการดึงประวัติสุขภาพ...");
            
            try {
                // 1. ดึงรายชื่อผู้ป่วยทั้งหมดจาก Firebase เพื่อเอา ID
                logMessage("⏳ [1/3] กำลังดึงรายชื่อผู้ป่วยทั้งหมดจาก Firebase...");
                const patSnap = await db.collection('Patients').get();
                const patients = [];
                patSnap.forEach(doc => {
                    patients.push({ id: doc.id, name: doc.data().name });
                });
                logMessage(`✅ พบผู้ป่วยเป้าหมาย ${patients.length} ราย`);

                let totalVitals = 0;
                let totalAssess = 0;

                // 2. วนลูปดึงข้อมูลจาก GAS ทีละคน (เพื่อไม่ให้ Google Sheets ทำงานหนักเกินไป)
                logMessage("<br>⏳ [2/3] เริ่มกระบวนการดูดข้อมูลประวัติรายบุคคล...");
                
                for (let i = 0; i < patients.length; i++) {
                    const p = patients[i];
                    logMessage(`> กำลังดึงประวัติ [${i+1}/${patients.length}]: ${p.name || 'ไม่ระบุชื่อ'}...`);
                    
                    try {
                        // ดึงสัญญาณชีพ (Vitals)
                        const vRes = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getVitals', id: p.id }) });
                        const vitals = await vRes.json();
                        
                        if (vitals && vitals.length > 0) {
                            const batch = db.batch();
                            vitals.forEach(v => {
                                const ref = db.collection('Vitals').doc();
                                batch.set(ref, { patient_id: String(p.id), ...v });
                                totalVitals++;
                            });
                            await batch.commit();
                        }

                        // ดึงประเมิน ADL/DEP (Assessments)
                        const aRes = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getAssessments', id: p.id }) });
                        const assess = await aRes.json();
                        
                        if (assess && assess.length > 0) {
                            const batch = db.batch();
                            assess.forEach(a => {
                                const ref = db.collection('Assessments').doc();
                                batch.set(ref, { patient_id: String(p.id), ...a });
                                totalAssess++;
                            });
                            await batch.commit();
                        }
                    } catch(err) {
                        logMessage(`<span class="text-red-400">⚠️ ข้ามผู้ป่วย ${p.name} (ดึงข้อมูลไม่สำเร็จ)</span>`);
                    }
                }

                // 3. สรุปผล
                logMessage("<br>⏳ [3/3] สรุปผลการย้ายข้อมูล...");
                logMessage(`✨ ย้ายประวัติสัญญาณชีพสำเร็จ: <b>${totalVitals}</b> รายการ`);
                logMessage(`✨ ย้ายประวัติประเมินผลสำเร็จ: <b>${totalAssess}</b> รายการ`);
                logMessage("<br>🎉🎉🎉 <b>กระบวนการเสร็จสมบูรณ์ 100%!</b> 🎉🎉🎉");
                
                btn.innerText = "✅ ย้ายประวัติเสร็จสมบูรณ์";
                btn.classList.replace('bg-slate-500', 'bg-[#00694a]');

            } catch (error) {
                logMessage(`<br><span class="text-red-400">❌ เกิดข้อผิดพลาดร้ายแรง: ${error.message}</span>`);
                btn.innerText = "❌ ล้มเหลว กรุณาลองใหม่";
                btn.disabled = false;
                btn.classList.replace('bg-slate-500', 'bg-red-600');
            }
        }
    </script>
</body>
</html>
