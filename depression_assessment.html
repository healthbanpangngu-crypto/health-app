<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>คัดกรองภาวะซึมเศร้า (2Q/9Q)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f9f9ff; padding-bottom: 120px; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + label { background-color: #1e3a8a; color: white; border-color: #1e3a8a; font-weight: bold; box-shadow: 0 4px 6px -1px rgba(30, 58, 138, 0.2); }
        .smooth-slide { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .loader-small { border: 2px solid #f3f3f3; border-bottom-color: transparent; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-[#111c2d]">

    <header class="bg-white sticky top-0 z-50 shadow-sm flex justify-between items-center w-full px-4 h-16 border-b border-gray-200">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-[#1e3a8a] hover:bg-gray-100 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h1 class="text-base font-bold text-[#1e3a8a]">คัดกรองภาวะซึมเศร้า</h1>
                <p class="text-xs text-gray-500" id="patient-id-display">รหัส: กำลังโหลด...</p>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        
        <section id="section-2q" class="space-y-4">
            <div class="flex items-center gap-2 pb-2 border-b border-gray-200">
                <span class="material-symbols-outlined text-[#F59E0B]">psychology_alt</span>
                <h2 class="font-bold text-lg text-[#111c2d]">แบบคัดกรอง 2Q</h2>
            </div>
            <p class="text-sm text-gray-500 mb-2">ในช่วง 2 สัปดาห์ที่ผ่านมา รวมทั้งวันนี้ ท่านมีอาการเหล่านี้หรือไม่?</p>
            
            <div id="container-2q" class="space-y-4"></div>
        </section>

        <section id="section-9q" class="space-y-4 hidden opacity-0 smooth-slide">
            <div class="flex items-center gap-2 pb-2 border-b border-gray-200 mt-6">
                <span class="material-symbols-outlined text-[#ba1a1a]">vital_signs</span>
                <h2 class="font-bold text-lg text-[#111c2d]">แบบประเมิน 9Q</h2>
            </div>
            <p class="text-sm text-[#ba1a1a] font-medium mb-2 bg-[#ffdad6]/30 p-3 rounded-lg border border-[#ffdad6]">
                พบความเสี่ยงจาก 2Q กรุณาประเมินความถี่ของอาการต่อไปนี้
            </p>
            
            <div id="container-9q" class="space-y-4"></div>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] p-4 flex justify-between items-center z-50">
        <div class="flex-1">
            <p class="text-[10px] text-gray-500 font-bold mb-0.5">ผลการคัดกรอง</p>
            <div class="flex items-center gap-2">
                <span id="result-status" class="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm">รอการประเมิน</span>
            </div>
            <p class="text-[10px] text-gray-400 mt-1" id="score-details">2Q: 0 | 9Q: 0</p>
        </div>
        <button onclick="saveDepression()" id="btn-save" class="bg-[#1e3a8a] text-white px-6 py-3.5 rounded-xl font-bold shadow-md hover:bg-[#172554] active:scale-95 transition-all flex items-center gap-2">
            บันทึกผล
            <span class="material-symbols-outlined text-sm">save</span>
        </button>
    </div>

    <script>
        // เริ่มต้น Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');
        document.getElementById('patient-id-display').innerText = `รหัส: ${patientId || 'ไม่ระบุ'}`;

        // ข้อมูลคำถาม 2Q
        const questions2Q = [
            { id: 'q2_1', text: "1. ท่านรู้สึกหดหู่ เศร้า หรือท้อแท้สิ้นหวัง หรือไม่?" },
            { id: 'q2_2', text: "2. ท่านรู้สึกเบื่อ ทำอะไรก็ไม่เพลิดเพลิน หรือไม่?" }
        ];

        // ข้อมูลคำถาม 9Q
        const questions9Q = [
            { id: 'q9_1', text: "1. เบื่อหน่าย ไม่สนใจอยากทำอะไร" },
            { id: 'q9_2', text: "2. ไม่สบายใจ ซึมเศร้า ท้อแท้" },
            { id: 'q9_3', text: "3. หลับยาก หรือหลับๆ ตื่นๆ หรือหลับมากไป" },
            { id: 'q9_4', text: "4. เหนื่อยง่าย หรือไม่ค่อยมีแรง" },
            { id: 'q9_5', text: "5. เบื่ออาหาร หรือกินมากเกินไป" },
            { id: 'q9_6', text: "6. รู้สึกไม่ดีกับตัวเอง คิดว่าตัวเองล้มเหลว หรือทำให้ตนเองหรือครอบครัวผิดหวัง" },
            { id: 'q9_7', text: "7. สมาธิไม่ดีเวลาทำอะไร เช่น ดูโทรทัศน์ ฟังวิทยุ หรือทำงานที่ต้องใช้ความตั้งใจ" },
            { id: 'q9_8', text: "8. พูดช้า ทำอะไรช้าลง จนคนอื่นสังเกตเห็น หรือกระสับกระส่ายไม่สามารถอยู่นิ่งได้เหมือนที่เคยเป็น" },
            { id: 'q9_9', text: "9. คิดทำร้ายตนเอง หรือคิดว่าถ้าตายไปคงจะดี" }
        ];

        const options9Q = [
            { label: "ไม่มีเลย", score: 0 },
            { label: "เป็นบางวัน (1-7 วัน)", score: 1 },
            { label: "เป็นบ่อย (มากกว่า 7 วัน)", score: 2 },
            { label: "เป็นทุกวัน", score: 3 }
        ];

        let need9Q = false;

        function render2Q() {
            const container = document.getElementById('container-2q');
            questions2Q.forEach(q => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="font-bold text-[#111c2d] mb-3 text-sm">${q.text}</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <input type="radio" id="${q.id}_0" name="${q.id}" value="0" onchange="calculateScore()">
                                <label for="${q.id}_0" class="block text-center p-3 text-sm bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-[#1e3a8a] transition-all">ไม่มี</label>
                            </div>
                            <div>
                                <input type="radio" id="${q.id}_1" name="${q.id}" value="1" onchange="calculateScore()">
                                <label for="${q.id}_1" class="block text-center p-3 text-sm bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-[#1e3a8a] transition-all">มี</label>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function render9Q() {
            const container = document.getElementById('container-9q');
            questions9Q.forEach(q => {
                let optionsHtml = '';
                options9Q.forEach((opt, idx) => {
                    optionsHtml += `
                        <div class="col-span-1">
                            <input type="radio" id="${q.id}_${idx}" name="${q.id}" value="${opt.score}" onchange="calculateScore()">
                            <label for="${q.id}_${idx}" class="block text-center p-2 text-xs bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-[#1e3a8a] transition-all h-full flex items-center justify-center">
                                ${opt.label}
                            </label>
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="font-bold text-[#111c2d] mb-3 text-sm">${q.text}</h3>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });
        }

        function calculateScore() {
            let score2Q = 0;
            let answered2Q = 0;
            
            questions2Q.forEach(q => {
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                if (selected) {
                    score2Q += parseInt(selected.value);
                    answered2Q++;
                }
            });

            const section9q = document.getElementById('section-9q');
            
            if (answered2Q === 2) {
                if (score2Q > 0) {
                    need9Q = true;
                    section9q.classList.remove('hidden');
                    setTimeout(() => section9q.classList.remove('opacity-0'), 50);
                } else {
                    need9Q = false;
                    section9q.classList.add('opacity-0');
                    setTimeout(() => section9q.classList.add('hidden'), 400);
                    questions9Q.forEach(q => {
                        const radios = document.getElementsByName(q.id);
                        radios.forEach(r => r.checked = false);
                    });
                }
            }

            let score9Q = 0;
            questions9Q.forEach(q => {
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                if (selected) score9Q += parseInt(selected.value);
            });

            document.getElementById('score-details').innerText = `2Q: ${score2Q} คะแนน | 9Q: ${need9Q ? score9Q : '-'} คะแนน`;
            const badge = document.getElementById('result-status');
            
            if (answered2Q < 2) {
                badge.innerText = 'รอการประเมิน';
                badge.className = 'bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm';
                return;
            }

            if (!need9Q) {
                badge.innerText = 'ปกติ (ไม่มีภาวะซึมเศร้า)';
                badge.className = 'bg-[#00694a] text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm';
            } else {
                if (score9Q < 7) {
                    badge.innerText = 'ปกติ / มีอาการน้อยมาก';
                    badge.className = 'bg-[#00694a] text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm';
                } else if (score9Q >= 7 && score9Q <= 12) {
                    badge.innerText = 'ซึมเศร้าระดับน้อย';
                    badge.className = 'bg-[#eab308] text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm';
                } else if (score9Q >= 13 && score9Q <= 18) {
                    badge.innerText = 'ซึมเศร้าระดับปานกลาง';
                    badge.className = 'bg-[#f97316] text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm';
                } else {
                    badge.innerText = 'ซึมเศร้าระดับรุนแรง';
                    badge.className = 'bg-[#ba1a1a] text-white px-3 py-1 rounded-full text-xs font-bold shadow-sm';
                }
            }
        }

        // [อัปเดต] บันทึกคะแนนเข้า Firebase โดยตรง 
        async function saveDepression() {
            if (!patientId) return alert("ไม่พบข้อมูลผู้ป่วย กรุณากลับไปหน้ารายชื่อ");

            let answered2Q = 0;
            questions2Q.forEach(q => { if(document.querySelector(`input[name="${q.id}"]:checked`)) answered2Q++; });
            if (answered2Q < 2) return alert('กรุณาตอบคำถาม 2Q ให้ครบถ้วน');

            if (need9Q) {
                let answered9Q = 0;
                questions9Q.forEach(q => { if(document.querySelector(`input[name="${q.id}"]:checked`)) answered9Q++; });
                if (answered9Q < 9) return alert(`กรุณาตอบคำถาม 9Q ให้ครบถ้วน (ตอบแล้ว ${answered9Q}/9 ข้อ)`);
            }

            const score2qStr = document.getElementById('score-details').innerText.split('|')[0].replace(/\D/g, '');
            const score9qStr = need9Q ? document.getElementById('score-details').innerText.split('|')[1].replace(/\D/g, '') : '0';
            const status = document.getElementById('result-status').innerText;
            
            const btn = document.getElementById('btn-save');
            btn.innerHTML = '<div class="loader-small mr-2"></div> กำลังบันทึก...';
            btn.disabled = true;

            try {
                // สร้างวันที่แบบไทย
                const now = new Date();
                const dd = String(now.getDate()).padStart(2, '0');
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const yyyy = now.getFullYear() + 543;
                const formattedDate = `${dd}/${mm}/${yyyy}`;

                // 1. อัปเดตสถานะซึมเศร้าในโปรไฟล์คนไข้
                await db.collection('Patients').doc(String(patientId)).update({
                    dep_status: status
                });

                // 2. บันทึกประวัติการประเมินลง Assessments เพื่อวาดกราฟ
                await db.collection('Assessments').add({
                    patient_id: String(patientId),
                    type: 'DEP',
                    score1: parseInt(score2qStr) || 0,
                    score2: parseInt(score9qStr) || 0,
                    result: status,
                    date: formattedDate,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 3. แอบยิงซิงค์ข้อมูลให้ Google Sheets ฝั่งหลังบ้าน
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ 
                        action: 'saveDepression', 
                        id: patientId, 
                        score2q: score2qStr, 
                        score9q: score9qStr, 
                        status: status 
                    })
                }).catch(e => console.log('Silent sync completed.'));

                alert('บันทึกผลการประเมินซึมเศร้าสำเร็จ!');
                window.location.href = `patient_profile.html?id=${patientId}`;

            } catch (err) {
                console.error(err);
                alert('การเชื่อมต่อฐานข้อมูลล้มเหลว กรุณาลองอีกครั้ง');
                btn.innerHTML = 'บันทึกผล <span class="material-symbols-outlined text-sm">save</span>'; 
                btn.disabled = false;
            }
        }

        render2Q();
        render9Q();
    </script>
</body>
</html>
