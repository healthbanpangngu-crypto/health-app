<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>ประเมิน ADL</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f9f9ff; padding-bottom: 100px; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + label { background-color: #00694a; color: white; border-color: #00694a; font-weight: bold; }
    </style>
    <script src="config.js"></script>
</head>
<body class="text-[#111c2d]">

    <header class="bg-white sticky top-0 z-50 shadow-sm flex justify-between items-center w-full px-4 h-16 border-b border-[#bdcac1]/30">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-[#00694a] hover:bg-gray-100 transition-colors">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h1 class="text-base font-bold text-[#00694a]">แบบประเมินคัดกรอง Barthel ADL</h1>
                <p class="text-xs text-gray-500" id="patient-id-display">รหัส: กำลังโหลด...</p>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <div id="question-container" class="space-y-4"></div>
    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] p-4 flex justify-between items-center z-50">
        <div>
            <p class="text-[10px] text-gray-500 font-bold mb-1">สรุปผลการประเมิน</p>
            <div class="flex items-baseline gap-2">
                <span class="text-2xl font-bold text-[#00694a]" id="total-score">0</span>
                <span class="text-sm text-gray-500">/ 20 คะแนน</span>
            </div>
            <span id="result-group" class="bg-[#ba1a1a] text-white px-2 py-0.5 rounded-md text-[10px] font-bold mt-1 inline-block">ติดเตียง</span>
        </div>
        <button onclick="saveADL()" id="btn-save" class="bg-[#00694a] text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-[#005239] transition-colors flex items-center gap-2">
            บันทึกผล
            <span class="material-symbols-outlined text-sm">save</span>
        </button>
    </div>

    <script>
     
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');
        document.getElementById('patient-id-display').innerText = `รหัส: ${patientId || 'ไม่ระบุ'}`;

        // อัปเดตข้อมูลแบบประเมินให้ตรงกับแบบฟอร์ม 20 คะแนน
        const adlQuestions = [
            { id: 'q1', title: "1. การรับประทานอาหารเมื่อเตรียมสำรับไว้ให้ (Feeding)", choices: [
                { label: "0: ไม่สามารถตักเข้าปากได้ ต้องมีคนป้อน", score: 0 },
                { label: "1: ตักอาหารเองได้แต่ต้องมีคนช่วย", score: 1 },
                { label: "2: ตักอาหารและช่วยตัวเองได้เป็นปกติ", score: 2 }
            ] },
            { id: 'q2', title: "2. การล้างหน้า หวีผม แปรงฟัน โกนหนวด (Grooming)", choices: [
                { label: "0: ต้องการความช่วยเหลือ", score: 0 },
                { label: "1: ทำเองได้ (หรือทำได้หากเตรียมอุปกรณ์ไว้ให้)", score: 1 }
            ] },
            { id: 'q3', title: "3. ลุกนั่งจากที่นอน หรือจากเตียงไปยังเก้าอี้ (Transfer)", choices: [
                { label: "0: ไม่สามารถนั่งได้ หรือต้องใช้คน 2 คนช่วยยก", score: 0 },
                { label: "1: ต้องการความช่วยเหลืออย่างมากจึงจะนั่งได้", score: 1 },
                { label: "2: ต้องการความช่วยเหลือบ้าง (ช่วยพยุงเล็กน้อย)", score: 2 },
                { label: "3: ทำได้เอง", score: 3 }
            ] },
            { id: 'q4', title: "4. การใช้ห้องน้ำ (Toilet use)", choices: [
                { label: "0: ช่วยตัวเองไม่ได้", score: 0 },
                { label: "1: ทำเองได้บ้าง แต่ต้องการความช่วยเหลือในบางสิ่ง", score: 1 },
                { label: "2: ช่วยตัวเองได้ดี (ขึ้นลงโถ ทำความสะอาดเองได้)", score: 2 }
            ] },
            { id: 'q5', title: "5. การเคลื่อนที่ภายในห้องหรือบ้าน (Mobility)", choices: [
                { label: "0: เคลื่อนที่ไปไหนไม่ได้", score: 0 },
                { label: "1: ต้องใช้รถเข็นและเข็นเองได้", score: 1 },
                { label: "2: เดินหรือเคลื่อนที่โดยมีคนช่วยพยุง", score: 2 },
                { label: "3: เดินหรือเคลื่อนที่ได้เอง", score: 3 }
            ] },
            { id: 'q6', title: "6. การสวมใส่เสื้อผ้า (Dressing)", choices: [
                { label: "0: ต้องมีคนสวมใส่ให้ ช่วยตัวเองไม่ได้", score: 0 },
                { label: "1: ช่วยตัวเองได้ร้อยละ 50 ที่เหลือมีคนช่วย", score: 1 },
                { label: "2: ช่วยตัวเองได้ดี", score: 2 }
            ] },
            { id: 'q7', title: "7. การขึ้นลงบันได 1 ชั้น (Stairs)", choices: [
                { label: "0: ไม่สามารถทำได้", score: 0 },
                { label: "1: ต้องการคนช่วย", score: 1 },
                { label: "2: ขึ้นลงได้เอง", score: 2 }
            ] },
            { id: 'q8', title: "8. การอาบน้ำ (Bathing)", choices: [
                { label: "0: ต้องมีคนช่วยหรือทำให้", score: 0 },
                { label: "1: อาบน้ำเองได้", score: 1 }
            ] },
            { id: 'q9', title: "9. การกลั้นการถ่ายอุจจาระใน 1 สัปดาห์ (Bowels)", choices: [
                { label: "0: กลั้นไม่ได้เลย หรือต้องสวนอุจจาระเสมอ", score: 0 },
                { label: "1: กลั้นไม่ได้บางครั้ง (น้อยกว่า 1 ครั้ง/สัปดาห์)", score: 1 },
                { label: "2: กลั้นได้เป็นปกติ", score: 2 }
            ] },
            { id: 'q10', title: "10. การกลั้นปัสสาวะใน 1 สัปดาห์ (Bladder)", choices: [
                { label: "0: กลั้นไม่ได้ หรือใส่สายสวนปัสสาวะ", score: 0 },
                { label: "1: กลั้นไม่ได้บางครั้ง (น้อยกว่าวันละ 1 ครั้ง)", score: 1 },
                { label: "2: กลั้นได้เป็นปกติ", score: 2 }
            ] }
        ];

        function renderQuestions() {
            const container = document.getElementById('question-container');
            adlQuestions.forEach((q, index) => {
                let optionsHtml = '';
                q.choices.forEach((choice, cIndex) => {
                    const inputId = `${q.id}_${cIndex}`;
                    optionsHtml += `
                        <div class="flex-1 min-w-[30%]">
                            <input type="radio" id="${inputId}" name="${q.id}" value="${choice.score}" onchange="calculateTotal()">
                            <label for="${inputId}" class="block text-center p-3 text-sm bg-white border-2 border-gray-100 rounded-xl cursor-pointer hover:border-[#00694a] transition-all h-full flex flex-col justify-center items-center gap-1">
                                <span>${choice.label.split(':')[1]}</span>
                                <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-bold w-fit">${choice.label.split(':')[0]}</span>
                            </label>
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div class="bg-white p-5 rounded-[20px] shadow-sm border border-gray-100">
                        <h3 class="font-bold text-[#111c2d] mb-3 leading-relaxed text-sm">${q.title}</h3>
                        <div class="flex flex-wrap gap-2">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            });
        }

        function calculateTotal() {
            let total = 0;
            adlQuestions.forEach(q => {
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                if (selected) total += parseInt(selected.value);
            });
            
            document.getElementById('total-score').innerText = total;
            
            const groupBadge = document.getElementById('result-group');
            if (total >= 12) {
                groupBadge.innerText = 'ติดสังคม';
                groupBadge.className = 'bg-[#00694a] text-white px-3 py-1 rounded-full text-xs font-bold mt-1 inline-block shadow-sm';
            } else if (total >= 5) {
                groupBadge.innerText = 'ติดบ้าน';
                groupBadge.className = 'bg-[#F59E0B] text-white px-3 py-1 rounded-full text-xs font-bold mt-1 inline-block shadow-sm';
            } else {
                groupBadge.innerText = 'ติดเตียง';
                groupBadge.className = 'bg-[#ba1a1a] text-white px-3 py-1 rounded-full text-xs font-bold mt-1 inline-block shadow-sm';
            }
        }

        async function saveADL() {
            if (!patientId) return alert("ไม่พบข้อมูลผู้ป่วย");

            let answered = 0;
            adlQuestions.forEach(q => { if(document.querySelector(`input[name="${q.id}"]:checked`)) answered++; });
            if (answered < 10) return alert(`กรุณาตอบคำถามให้ครบถ้วน (ตอบแล้ว ${answered}/10 ข้อ)`);

            const score = document.getElementById('total-score').innerText;
            const group = document.getElementById('result-group').innerText;
            const btn = document.getElementById('btn-save');
            
            btn.innerHTML = 'กำลังบันทึก...';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'saveADLScore', id: patientId, score: score, group: group })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('บันทึกผลการประเมินสำเร็จ!');
                    window.location.href = `patient_profile.html?id=${patientId}`;
                } else {
                    alert('เกิดข้อผิดพลาด: ' + data.error);
                    btn.innerHTML = 'บันทึกผล'; btn.disabled = false;
                }
            } catch (err) {
                alert('การเชื่อมต่อล้มเหลว');
                btn.innerHTML = 'บันทึกผล'; btn.disabled = false;
            }
        }

        renderQuestions();
    </script>
</body>
</html>
