<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>ตั้งค่าโปรไฟล์ อสม. - อสม.สามารถ (Orsomo Smart)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; padding-bottom: 100px; -webkit-tap-highlight-color: transparent;}
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .input-field { width: 100%; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; font-size: 15px; outline: none; transition: all 0.2s; background-color: #f8fafc; }
        .input-field:focus { border-color: #00694a; box-shadow: 0 0 0 3px rgba(0,105,74,0.1); background-color: #ffffff; }
        .loader-small { border: 2px solid #d8e3fb; border-bottom-color: #00694a; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-[#111c2d]">

    <header class="bg-white sticky top-0 z-50 shadow-sm flex items-center w-full px-4 h-16 border-b border-gray-100 gap-3">
        <button onclick="window.location.href='dashboard.html'" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-[#00694a] hover:bg-gray-100 transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-base font-bold text-[#00694a]">ตั้งค่าโปรไฟล์</h1>
    </header>

    <main class="max-w-2xl mx-auto p-4 pt-6 space-y-6">
        
        <div id="loading-overlay" class="bg-[#f0fdf4] border border-[#bbf7d0] p-3 rounded-xl flex items-center justify-center gap-2 mb-2 text-[#15803d] text-sm font-bold">
            <div class="loader-small" style="width:16px; height:16px; border-width:2px; border-bottom-color:#15803d;"></div> กำลังดึงข้อมูลจากฐานข้อมูล...
        </div>

        <form id="profile-form" class="space-y-6 hidden">
            <input type="hidden" id="vhv_uid">
            <input type="hidden" id="pic_url" value="">

            <div class="bg-white rounded-[22px] p-6 shadow-sm border border-gray-100 flex flex-col items-center justify-center relative">
                <div class="relative w-28 h-28 mb-3">
                    <div id="profile-preview" class="w-full h-full rounded-full bg-[#eef2ff] border-4 border-white shadow-md flex items-center justify-center text-[#00694a] font-bold text-3xl overflow-hidden">
                        อส
                    </div>
                </div>
                <h2 class="font-bold text-[16px] text-[#111c2d]" id="display-name">...</h2>
                <p class="text-xs text-[#00694a] mt-0.5 bg-[#f0fdf4] px-2 py-0.5 rounded-md font-bold mb-4" id="display-village">พื้นที่: ...</p>
                
                <button type="button" onclick="syncLineProfile()" class="text-xs font-bold text-[#00b900] bg-[#00b900]/10 px-4 py-2 rounded-xl hover:bg-[#00b900]/20 transition-colors flex items-center justify-center gap-1.5 active:scale-95">
                    <span class="material-symbols-outlined text-[16px]">sync</span> อัปเดตรูปจากแอป LINE
                </button>
            </div>

            <div class="bg-white rounded-[22px] p-6 shadow-sm border border-gray-100 space-y-4">
                <h3 class="font-bold text-[#00694a] flex items-center gap-2 border-b pb-3 mb-2">
                    <span class="material-symbols-outlined text-[20px]">manage_accounts</span> ข้อมูลส่วนบุคคล
                </h3>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-[#526069]">ชื่อ - นามสกุล อสม.</label>
                    <input type="text" id="vhv_name" class="input-field" placeholder="ระบุชื่อ-นามสกุล" required>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-[#526069]">เบอร์โทรศัพท์ติดต่อ</label>
                    <input type="tel" id="vhv_phone" class="input-field" placeholder="เช่น 0812345678">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-[#526069]">พื้นที่รับผิดชอบ (หมู่ที่)</label>
                    <select id="vhv_village" class="input-field bg-white" required>
                        <option value="" disabled selected>โหลดข้อมูล...</option>
                    </select>
                </div>
            </div>

            <div class="fixed bottom-[85px] left-0 w-full px-4 z-40">
                <div class="max-w-2xl mx-auto">
                    <button type="submit" id="btn-save-profile" class="w-full bg-[#00694a] text-white py-4 rounded-[16px] font-bold shadow-lg hover:bg-[#005239] active:scale-95 transition-all flex items-center justify-center gap-2 text-[15px]">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                        บันทึกการอัปเดต
                    </button>
                </div>
            </div>
        </form>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] grid grid-cols-4 h-[75px] z-50 px-2 pb-2">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">
            <span class="material-symbols-outlined mb-0.5 text-[24px]">home</span>
            <span class="text-[10px] font-medium">หน้าหลัก</span>
        </button>
        <button onclick="window.location.href='patient_list.html'" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">
            <span class="material-symbols-outlined mb-0.5 text-[24px]">group</span>
            <span class="text-[10px] font-medium">ผู้ป่วย</span>
        </button>
        <button onclick="window.location.href='assessments.html'" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-600 transition-colors">
            <span class="material-symbols-outlined mb-0.5 text-[24px]">assignment</span>
            <span class="text-[10px] font-medium">การประเมิน</span>
        </button>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center justify-center m-1.5 bg-[#00694a] text-white rounded-[18px] shadow-sm">
            <span class="material-symbols-outlined mb-0.5 text-[24px]" style="font-variation-settings: 'FILL' 1;">settings</span>
            <span class="text-[10px] font-bold">ตั้งค่า</span>
        </button>
    </nav>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener("DOMContentLoaded", () => {
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (liff.isLoggedIn()) {
                    liff.getProfile().then(profile => {
                        document.getElementById('vhv_uid').value = profile.userId;
                        fetchVHVData(profile.userId); 
                    });
                } else { liff.login(); }
            });
        });

        // ดึงข้อมูลผู้ใช้งานตรงจาก Firebase
        async function fetchVHVData(uid) {
            try {
                const docSnap = await db.collection('VHVs').doc(String(uid)).get();
                let vCount = 15;
                let data = null;

                if (docSnap.exists) {
                    data = docSnap.data();
                    vCount = parseInt(data.village_count) || 15;
                } else {
                    // ถ้าใน Firebase ยังไม่มี ให้ดึงจาก GAS แล้วเซ็ตค่าพื้นฐาน
                    const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'checkUserRegistration', uid: uid }) });
                    data = await response.json();
                    vCount = parseInt(data.village_count) || 15;
                }

                if (data && (data.status === 'registered' || data.status === 'Active')) {
                    // สร้าง Dropdown หมู่บ้าน
                    const villageSelect = document.getElementById('vhv_village');
                    villageSelect.innerHTML = '<option value="" disabled selected>เลือกหมู่ที่ดูแล...</option>';
                    for (let i = 1; i <= vCount; i++) {
                        villageSelect.insertAdjacentHTML('beforeend', `<option value="${i}">หมู่ที่ ${i}</option>`);
                    }

                    document.getElementById('vhv_name').value = data.name;
                    document.getElementById('vhv_phone').value = data.phone || '';
                    document.getElementById('display-name').innerText = data.name;
                    
                    if (String(data.role).toUpperCase() === 'ADMIN') {
                        document.getElementById('display-village').innerText = 'สิทธิ์ใช้งาน: แอดมิน (ADMIN)';
                        const adminOption = document.createElement('option');
                        adminOption.value = 'ADMIN'; adminOption.innerText = 'เจ้าหน้าที่สาธารณสุข (ADMIN)';
                        villageSelect.appendChild(adminOption);
                        villageSelect.value = 'ADMIN';
                    } else {
                        const vNum = data.village_no || data.village;
                        document.getElementById('vhv_village').value = vNum;
                        document.getElementById('display-village').innerText = 'พื้นที่: หมู่ ' + vNum;
                    }
                    
                    const actualPicUrl = data.profile_pic || data.pic_url;
                    if (actualPicUrl) {
                        document.getElementById('pic_url').value = actualPicUrl;
                        document.getElementById('profile-preview').innerHTML = `<img src="${actualPicUrl}" class="w-full h-full object-cover">`;
                    }
                }
                
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('profile-form').classList.remove('hidden');

            } catch (error) {
                document.getElementById('loading-overlay').innerHTML = "โหลดข้อมูลโปรไฟล์ผิดพลาด";
            }
        }

        async function syncLineProfile() {
            try {
                const profile = await liff.getProfile();
                const picUrl = profile.pictureUrl;
                if(picUrl) {
                    document.getElementById('pic_url').value = picUrl;
                    document.getElementById('profile-preview').innerHTML = `<img src="${picUrl}" class="w-full h-full object-cover">`;
                    alert('ดึงรูปโปรไฟล์จากแอป LINE เรียบร้อยแล้ว (อย่าลืมกดปุ่มบันทึกด้านล่างนะครับ)');
                } else alert('บัญชี LINE ของคุณไม่มีรูปโปรไฟล์ครับ');
            } catch (error) { alert('ไม่สามารถดึงรูปจาก LINE ได้'); }
        }

        // บันทึกการแก้ไขเข้า Firebase
        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save-profile');
            btn.innerHTML = `<div class="loader-small" style="border-bottom-color:#fff;"></div> กำลังบันทึก...`;
            btn.disabled = true;

            const uid = document.getElementById('vhv_uid').value;
            const name = document.getElementById('vhv_name').value.trim();
            const phone = document.getElementById('vhv_phone').value.trim();
            const village = document.getElementById('vhv_village').value;
            const picUrl = document.getElementById('pic_url').value;

            try {
                // 1. บันทึกเข้า Firebase ทันที
                await db.collection('VHVs').doc(String(uid)).update({
                    name: name,
                    phone: phone,
                    village_no: village,
                    profile_pic: picUrl
                });

                // 2. แอบซิงค์ลงชีต
                fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'updateVHVProfile', 
                        data: { uid: uid, name: name, phone: phone, village: village, pic: picUrl } 
                    }) 
                }).catch(err => console.log('Silent sync profile completed.'));

                document.getElementById('display-name').innerText = name;
                document.getElementById('display-village').innerText = 'พื้นที่: หมู่ ' + village;
                
                btn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span> บันทึกสำเร็จ`;
                btn.classList.replace('bg-[#00694a]', 'bg-[#22c55e]');
                
                setTimeout(() => {
                    btn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span> บันทึกการอัปเดต`;
                    btn.classList.replace('bg-[#22c55e]', 'bg-[#00694a]');
                    btn.disabled = false;
                }, 2000);

            } catch (error) {
                alert("เชื่อมต่อฐานข้อมูลล้มเหลว กรุณาลองใหม่");
                btn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span> บันทึกการอัปเดต`;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
